name: 🚀 FastAPI 全自动测试流水线

# 触发条件：什么时候让机器人开始干活？
on:
  push:
    branches:
      - main
      - master  # 只要有人向 main 或 master 分支 push 代码，就触发！

# 任务清单：机器人具体要做什么？
jobs:
  test:
    name: 运行自动化测试
    runs-on: ubuntu-latest  # 机器人会借用一台最新的 Ubuntu Linux 电脑

    steps:
      - name: 📥 第一步：把我们的代码从仓库下载到这台电脑上
        uses: actions/checkout@v3

      - name: 🐍 第二步：安装 Python 3.11 环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 第三步：安装 requirements.txt 里的依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # 额外装一下测试工具

      - name: 🧪 第四步：执行自动化测试！
        run: |
          pytest