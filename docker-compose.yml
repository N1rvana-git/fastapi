
services:
  # 1. 我们的 FastAPI 后端服务
  web:
    build: .                 # 告诉 Docker，根据当前目录的 Dockerfile 构建镜像
    container_name: fastapi_app
    ports:
      - "8000:8000"          # 把容器内的 8000 端口暴露出来
    depends_on:
      - db                   # 启动顺序：必须先启动数据库和缓存
      - redis
    environment:
      # ⚠️ 极其关键：在 Docker 内部的网络里，数据库的地址不再是 127.0.0.1，而是容器名 'db' 和 'redis'
      - DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydb
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app

  # 2. PostgreSQL 数据库服务
  db:
    image: pgvector/pgvector:pg15 # 直接拉取官方轻量级镜像
    restart: always
    container_name: postgres_db
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # 数据持久化，防止容器重启后数据清空

  # 3. Redis 缓存服务
  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  # 👇👇👇 追加这个全新的常驻黑灯工厂服务 👇👇👇
  celery_worker:
    build: .
    command: celery -A src.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:        # 🌟 绝对不能漏！打工人需要 ZHIPU_API_KEY 才能干活！
      - .env
    environment:
      # 🌟 你的 Redis 容器名是 redis_cache 还是 redis？必须和你的网络对齐！
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fastapi_db
      - REDIS_URL=redis://redis:6379/0  # 如果你的redis服务叫redis，就把这里改回redis
    depends_on:
      - db
      - redis  # 同上

# 声明用来保存数据库数据的“虚拟硬盘”
volumes:
  pgdata:
